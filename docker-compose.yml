version: "3.9"

services:

  frontend:
    build:
      context: ./frontend/frontend-hospital
    container_name: hospital-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000


  backend:
    build:
      context: ./backend/novacare-hospital
    container_name: hospital-backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: khurramkhan1234@5
      DB_NAME: hospital_db
      DB_PORT: 3306
      SECRET_KEY: k678$%%%32
      ALGORITHM: HS256


  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: khurramkhan1234@5
      MYSQL_DATABASE: hospital_db
    volumes:
      - mysql_data:/var/lib/mysql


volumes:
  mysql_data: